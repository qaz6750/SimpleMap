    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf6f2"/><stop offset="1" stop-color="#e9eef7"/></linearGradient>
    <clipPath id="screen"><rect x="256" y="103" width="488" height="976" rx="36"/></clipPath>
