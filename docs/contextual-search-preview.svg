  <circle cx="500" cy="1092" r="4" fill="#30433c"/>
  <g font-family="sans-serif" text-anchor="middle"><text x="250" y="1153" font-size="14" font-weight="700" fill="#17211f">城市结果更准确</text><text x="500" y="1153" font-size="14" font-weight="700" fill="#17211f">公交与地点分区</text><text x="750" y="1153" font-size="14" font-weight="700" fill="#17211f">距离排序透明</text></g>
