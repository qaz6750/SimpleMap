<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1200" viewBox="0 0 1000 1200">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#17332b" flood-opacity=".16"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef6f2"/><stop offset="1" stop-color="#e8eef7"/></linearGradient>
    <clipPath id="screen"><rect x="256" y="103" width="488" height="976" rx="36"/></clipPath>
  </defs>
  <rect width="1000" height="1200" fill="url(#bg)"/>
  <text x="76" y="56" font-family="sans-serif" font-size="30" font-weight="700" fill="#17211f">隐私与本地数据管理</text>
  <text x="76" y="88" font-family="sans-serif" font-size="14" fill="#687872">权限按需申请 · 数据可控清除 · 隐私同意可撤回</text>
  <rect x="229" y="76" width="542" height="1030" rx="64" fill="#101d18" filter="url(#shadow)"/>
  <rect x="256" y="103" width="488" height="976" rx="36" fill="#f4f7fb"/>
  <rect x="423" y="89" width="154" height="24" rx="12" fill="#07110e"/>
  <g clip-path="url(#screen)" font-family="sans-serif">
    <text x="286" y="157" font-size="27" font-weight="700" fill="#17211f">我的</text>
    <rect x="282" y="184" width="436" height="50" rx="8" fill="#edf2f8"/>
    <rect x="572" y="188" width="142" height="42" rx="7" fill="#1769e0"/>
    <text x="354" y="216" text-anchor="middle" font-size="13" fill="#68736f">收藏</text>
    <text x="500" y="216" text-anchor="middle" font-size="13" fill="#68736f">离线地图</text>
    <text x="643" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">设置</text>

    <text x="286" y="278" font-size="16" font-weight="700" fill="#17211f">导航设置</text>
    <g font-size="13" fill="#17211f">
      <text x="300" y="325">语音导航</text><text x="300" y="345" font-size="11" fill="#68736f">播报转向、路况与到达提醒</text>
      <rect x="641" y="308" width="55" height="31" rx="16" fill="#1769e0"/><circle cx="680" cy="323" r="12" fill="#fff"/>
      <line x1="286" y1="371" x2="714" y2="371" stroke="#e1e8e4"/>
      <text x="300" y="408">实时路况</text><text x="300" y="428" font-size="11" fill="#68736f">在地图和导航路线中显示拥堵</text>
      <rect x="641" y="391" width="55" height="31" rx="16" fill="#1769e0"/><circle cx="680" cy="406" r="12" fill="#fff"/>
      <line x1="286" y1="454" x2="714" y2="454" stroke="#e1e8e4"/>
      <text x="300" y="491">路线状态提醒</text><text x="300" y="511" font-size="11" fill="#68736f">偏航或拥堵重规划时显示提示</text>
      <rect x="641" y="474" width="55" height="31" rx="16" fill="#1769e0"/><circle cx="680" cy="489" r="12" fill="#fff"/>
    </g>

    <line x1="286" y1="550" x2="714" y2="550" stroke="#dce4e0"/>
    <text x="286" y="589" font-size="16" font-weight="700" fill="#17211f">隐私与权限</text>
    <text x="286" y="616" font-size="12" fill="#68736f">地图服务仅在同意隐私说明后初始化</text>

    <rect x="286" y="645" width="428" height="72" rx="8" fill="#f0f4f2"/>
    <text x="302" y="674" font-size="14" font-weight="700" fill="#17211f">系统应用权限</text>
    <text x="302" y="697" font-size="11" fill="#68736f">管理定位、通知等系统权限</text>
    <path d="M683 676l8 8-8 8" fill="none" stroke="#1769e0" stroke-width="2"/>

    <rect x="286" y="729" width="428" height="72" rx="8" fill="#f0f4f2"/>
    <text x="302" y="758" font-size="14" font-weight="700" fill="#17211f">清除本地数据</text>
    <text x="302" y="781" font-size="11" fill="#68736f">删除收藏、行程与导航设置</text>
    <path d="M683 760l8 8-8 8" fill="none" stroke="#1769e0" stroke-width="2"/>

    <rect x="286" y="813" width="428" height="72" rx="8" fill="#ffeeec"/>
    <text x="302" y="842" font-size="14" font-weight="700" fill="#b33a32">撤回隐私同意</text>
    <text x="302" y="865" font-size="11" fill="#68736f">下次启动时重新显示隐私说明</text>
    <path d="M683 844l8 8-8 8" fill="none" stroke="#b33a32" stroke-width="2"/>

    <rect x="286" y="919" width="428" height="108" rx="12" fill="#fff" stroke="#dce4e0"/>
    <text x="310" y="951" font-size="16" font-weight="700" fill="#17211f">清除本地数据？</text>
    <text x="310" y="978" font-size="11" fill="#68736f">收藏、行程和导航设置将被删除</text>
    <text x="585" y="1008" font-size="12" fill="#68736f">取消</text>
    <text x="680" y="1008" text-anchor="end" font-size="12" font-weight="700" fill="#b33a32">确认清除</text>
  </g>
  <circle cx="500" cy="1092" r="4" fill="#30433c"/>
  <g font-family="sans-serif" text-anchor="middle"><text x="250" y="1153" font-size="14" font-weight="700" fill="#17211f">按需申请权限</text><text x="500" y="1153" font-size="14" font-weight="700" fill="#17211f">本地数据透明可控</text><text x="750" y="1153" font-size="14" font-weight="700" fill="#17211f">破坏操作二次确认</text></g>
</svg>
