<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#08111f" flood-opacity=".24"/></filter>
    <pattern id="dayMap" width="160" height="120" patternUnits="userSpaceOnUse"><rect width="160" height="120" fill="#d8e2f0"/><path d="M-20 100C35 55 95 82 180 15M36-15C72 35 66 79 44 138" fill="none" stroke="#f5f7fb" stroke-width="12"/></pattern>
    <pattern id="nightMap" width="160" height="120" patternUnits="userSpaceOnUse"><rect width="160" height="120" fill="#111a29"/><path d="M-20 100C35 55 95 82 180 15M36-15C72 35 66 79 44 138" fill="none" stroke="#2d3c54" stroke-width="12"/></pattern>
    <clipPath id="landscape"><rect x="62" y="140" width="760" height="500" rx="26"/></clipPath>
    <clipPath id="portrait"><rect x="972" y="120" width="350" height="580" rx="30"/></clipPath>
  </defs>
  <rect width="1400" height="820" fill="#f4f7fb"/>
  <text x="62" y="62" font-family="sans-serif" font-size="30" font-weight="700" fill="#172033">弱 GPS 模式与夜间导航</text>
  <text x="62" y="94" font-family="sans-serif" font-size="14" fill="#66758b">区分定位未开启与信号弱 · 合并 SDK、卫星与精度诊断 · 5 秒自动关闭</text>

  <rect x="36" y="114" width="812" height="552" rx="48" fill="#101927" filter="url(#shadow)"/>
  <rect x="62" y="140" width="760" height="500" rx="26" fill="url(#dayMap)"/>
  <g clip-path="url(#landscape)">
    <path d="M350 672C466 568 520 520 612 408C686 318 760 276 855 238" fill="none" stroke="#26384f" stroke-width="58"/><path d="M350 672C466 568 520 520 612 408C686 318 760 276 855 238" fill="none" stroke="#1769e0" stroke-width="14"/>
    <rect x="80" y="158" width="340" height="464" rx="16" fill="#1a2b42" filter="url(#shadow)"/>
    <text x="102" y="198" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff">GPS 定位详情</text>
    <text x="102" y="222" font-family="sans-serif" font-size="12" font-weight="700" fill="#8ec7ff">5 秒后自动关闭</text>
    <text x="394" y="198" text-anchor="end" font-family="sans-serif" font-size="12" font-weight="700" fill="#8ec7ff">关闭</text>
    <line x1="102" y1="242" x2="398" y2="242" stroke="#5f8fc4" stroke-opacity=".45"/>
    <g font-family="sans-serif"><text x="102" y="279" font-size="13" fill="#b9cbe4">可见卫星</text><text x="398" y="279" text-anchor="end" font-size="14" font-weight="700" fill="#fff">18 颗</text><text x="102" y="322" font-size="13" fill="#b9cbe4">参与定位</text><text x="398" y="322" text-anchor="end" font-size="14" font-weight="700" fill="#fff">11 颗</text><text x="102" y="365" font-size="13" fill="#b9cbe4">平均信号</text><text x="398" y="365" text-anchor="end" font-size="14" font-weight="700" fill="#fff">31.5 dB-Hz</text><text x="102" y="408" font-size="13" fill="#b9cbe4">北斗（中国）</text><text x="398" y="408" text-anchor="end" font-size="14" font-weight="700" fill="#fff">8 颗</text><text x="102" y="451" font-size="13" fill="#b9cbe4">GPS（美国）</text><text x="398" y="451" text-anchor="end" font-size="14" font-weight="700" fill="#fff">10 颗</text></g>
    <rect x="568" y="174" width="92" height="36" rx="9" fill="#27405f"/><text x="614" y="197" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#8ec7ff">GPS 11</text>
  </g>

  <rect x="946" y="94" width="402" height="632" rx="52" fill="#0a101a" filter="url(#shadow)"/>
  <rect x="972" y="120" width="350" height="580" rx="30" fill="url(#nightMap)"/>
  <rect x="1084" y="104" width="126" height="22" rx="11" fill="#05080d"/>
  <g clip-path="url(#portrait)">
    <path d="M1032 748C1058 622 1115 570 1156 478C1190 402 1216 324 1350 245" fill="none" stroke="#27384f" stroke-width="52"/><path d="M1032 748C1058 622 1115 570 1156 478C1190 402 1216 324 1350 245" fill="none" stroke="#1769e0" stroke-width="13"/>
    <rect x="988" y="140" width="318" height="112" rx="14" fill="#1a2b42"/>
    <text x="1006" y="172" font-family="sans-serif" font-size="11" font-weight="700" fill="#8ec7ff">夜间模式</text><text x="1006" y="205" font-family="sans-serif" font-size="23" font-weight="700" fill="#fff">机场高速</text><text x="1006" y="231" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">靠右行驶 · 1.2 公里后</text>
    <rect x="988" y="402" width="318" height="278" rx="16" fill="#1a2b42" filter="url(#shadow)"/>
    <text x="1008" y="439" font-family="sans-serif" font-size="19" font-weight="700" fill="#fff">GPS 定位详情</text><text x="1008" y="462" font-family="sans-serif" font-size="11" fill="#8ec7ff">5 秒后自动关闭</text><text x="1286" y="440" text-anchor="end" font-family="sans-serif" font-size="11" font-weight="700" fill="#8ec7ff">关闭</text>
    <line x1="1008" y1="480" x2="1286" y2="480" stroke="#5f8fc4" stroke-opacity=".45"/>
    <rect x="1008" y="493" width="278" height="48" rx="8" fill="#56343b"/><text x="1020" y="512" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">弱 GPS 模式</text><text x="1020" y="530" font-family="sans-serif" font-size="9" fill="#ffdad6">沿当前道路行驶，并等待定位信号恢复</text>
    <g font-family="sans-serif"><text x="1008" y="565" font-size="12" fill="#b9cbe4">可见卫星</text><text x="1286" y="565" text-anchor="end" font-size="13" font-weight="700" fill="#fff">18 颗</text><text x="1008" y="600" font-size="12" fill="#b9cbe4">参与定位</text><text x="1286" y="600" text-anchor="end" font-size="13" font-weight="700" fill="#fff">11 颗</text><text x="1008" y="635" font-size="12" fill="#b9cbe4">平均信号</text><text x="1286" y="635" text-anchor="end" font-size="13" font-weight="700" fill="#fff">31.5 dB-Hz</text><text x="1008" y="670" font-size="12" fill="#b9cbe4">北斗（中国）</text><text x="1286" y="670" text-anchor="end" font-size="13" font-weight="700" fill="#fff">8 颗</text></g>
  </g>
  <text x="442" y="758" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#172033">横屏面板固定左侧，不遮挡地图主视野</text>
  <text x="1147" y="758" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#172033">弱信号降级提示不误报定位关闭</text>
</svg>