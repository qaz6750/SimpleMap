    <text x="676" y="603" font-size="11" font-weight="700" fill="#8ec7ff">当前状态</text><text x="676" y="629" font-size="16" font-weight="700" fill="#fff">简洁播报 · 静音时段已启用</text><text x="676" y="650" font-size="10" fill="#b9cbe4">完全静音优先于重要提示开关</text>
