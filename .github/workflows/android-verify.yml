name: Android Verify

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: android-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Test, lint, and compile
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure Android SDK path
        run: printf 'sdk.dir=%s\n' "$ANDROID_HOME" > local.properties

      - name: Verify AMap dependency graph
        run: |
          ./gradlew :app:dependencies --configuration debugRuntimeClasspath > dependencies.txt
          grep -Eo 'com\.amap\.(api|lbs\.client):[^: ]+:[^ )]+' dependencies.txt | sort -u > amap-dependencies.txt
          printf '%s\n' 'com.amap.api:navi-3dmap-location-search:11.2.000_3dmap11.2.000_loc11.2.000_sea9.8.0' > expected-amap-dependencies.txt
          diff -u expected-amap-dependencies.txt amap-dependencies.txt

      - name: Run verification
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleDebugAndroidTest --build-cache

      - name: Upload debug artifacts
        if: success() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: simplemap-debug-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            app/build/reports/lint-results-debug.html

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simplemap-verify-reports-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            app/build/reports/
            app/build/test-results/