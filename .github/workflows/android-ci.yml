name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure local Android properties
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
        run: |
          printf 'sdk.dir=%s\nAMAP_API_KEY=%s\n' "$ANDROID_HOME" "$AMAP_API_KEY" > local.properties

      - name: Verify dependency graph
        run: |
          ./gradlew :app:dependencies --configuration releaseRuntimeClasspath --no-daemon > dependencies.txt
          grep -Eo 'com\.amap\.(api|lbs\.client):[^: ]+:[^ )]+' dependencies.txt | sort -u > amap-dependencies.txt
          printf '%s\n' 'com.amap.api:navi-3dmap-location-search:11.2.000_3dmap11.2.000_loc11.2.000_sea9.8.0' > expected-amap-dependencies.txt
          diff -u expected-amap-dependencies.txt amap-dependencies.txt

      - name: Test, lint, and build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease assembleDebugAndroidTest --no-daemon

      - name: Upload APKs and lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simplemap-build-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk
            app/build/reports/lint-results-debug.html
            docs/simplemap-ui-preview.svg
            docs/navigation-portrait-preview.svg
            docs/navigation-junction-landscape-preview.svg
            docs/privacy-data-controls-preview.svg