name: Android Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Require AMap API key
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
        run: |
          if [[ -z "$AMAP_API_KEY" ]]; then
            echo "AMAP_API_KEY repository secret is required for releases." >&2
            exit 1
          fi
          printf 'sdk.dir=%s\nAMAP_API_KEY=%s\n' "$ANDROID_HOME" "$AMAP_API_KEY" > local.properties

      - name: Verify tag matches app version
        run: |
          version=$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts)
          [[ "$GITHUB_REF_NAME" == "v$version" ]] || {
            echo "Tag $GITHUB_REF_NAME does not match versionName $version." >&2
            exit 1
          }

      - name: Verify and build release
        run: ./gradlew testDebugUnitTest lintDebug assembleRelease bundleRelease --build-cache

      - name: Create checksums
        run: |
          sha256sum \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/bundle/release/app-release.aab \
            > SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=(--verify-tag --title "SimpleMap $GITHUB_REF_NAME" --generate-notes)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/bundle/release/app-release.aab \
            SHA256SUMS.txt \
            "${release_flags[@]}"